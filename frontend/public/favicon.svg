    <path d="M-6,4 Q-6,10 0,10 Q6,10 6,4" fill="none" stroke="#2D3436" stroke-width="2"/>
    <line x1="0" y1="10" x2="0" y2="14" stroke="#2D3436" stroke-width="2"/>
    <line x1="-4" y1="14" x2="4" y2="14" stroke="#2D3436" stroke-width="2" stroke-linecap="round"/>
