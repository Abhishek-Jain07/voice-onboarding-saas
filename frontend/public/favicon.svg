    <ellipse cx="0" cy="-16" rx="4" ry="8" fill="#FFD966" opacity="0.8"/>
    <ellipse cx="0" cy="-16" rx="4" ry="8" fill="#FFD966" opacity="0.8" transform="rotate(45)"/>
